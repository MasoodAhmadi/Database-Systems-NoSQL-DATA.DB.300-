# version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16-trixie
    container_name: postgres_lab
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student
      POSTGRES_DB: labdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Custom configs:
      - ./postgres-config/postgresql.conf:/etc/postgresql/postgresql.conf
      - ./postgres-config/pg_hba.conf:/etc/postgresql/pg_hba.conf
    command:
      [
        "postgres",
        "-c",
        "config_file=/etc/postgresql/postgresql.conf",
        "-c",
        "hba_file=/etc/postgresql/pg_hba.conf",
      ]

  mongodb:
    image: mongo:${MONGO_VERSION}
    container_name: mongo_lab
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-init:/docker-entrypoint-initdb.d
      - mongo_data:/data/db

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:1.0.0
    container_name: mongo-express
    restart: always
    depends_on:
      - mongodb
    ports:
      - "8080:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123

  express-server:
    build: ./server
    container_name: express_lab
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017/banking?authSource=admin
    restart: always
  # cassandra:
  #   image: cassandra:5.0
  #   container_name: cassandra_lab
  #   ports:
  #     - "9042:9042"
  #   environment:
  #     - CASSANDRA_START_RPC=true
  #   volumes:
  #     - cassandra_data:/var/lib/cassandra

volumes:
  postgres_data:
  mongo_data:
  cassandra_data:
  mongo-init:
